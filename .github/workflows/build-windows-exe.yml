name: Build Windows EXE

# 手动触发：在仓库网页 Actions 里点 "Run workflow" 就会在 GitHub 的 Windows 机器上打包
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tool + deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build standalone exe
        run: pyinstaller --clean --noconfirm MyLibrary.spec

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLibrary-windows-exe
          path: dist/MyLibrary.exe
          if-no-files-found: error
