name: Build Windows EXE & Release

# 两种触发方式：
#   1. push 一个 vX.Y.Z 格式的 tag → 自动打包并创建 GitHub Release（附 exe）
#   2. 仓库 Actions 页手动点 "Run workflow" → 只打包，不发 Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tool + deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build standalone exe
        run: pyinstaller --clean --noconfirm MyLibrary.spec

      # 手动触发时：只上传为 artifact（不发 Release）
      - name: Upload exe as artifact (manual run only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: MyLibrary-windows-exe
          path: dist/MyLibrary.exe
          if-no-files-found: error

      # tag 触发时：创建 GitHub Release 并把 exe 附上
      - name: Create GitHub Release with exe
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true          # 先作为草稿，你在 GitHub 网页确认后手动发布
          name: "MyLibrary ${{ github.ref_name }}"
          body: |
            ## MyLibrary ${{ github.ref_name }}

            **Windows 免安装版**：下载下方的 `MyLibrary.exe`，双击即用。
            首次运行会在 exe 同目录自动建好空书库并打开浏览器，无需安装 Python。
            Windows 可能提示「未知发行者」，点「更多信息 → 仍要运行」即可。

            > 详细更新内容见仓库 `docs/更新日志.md`。
          files: dist/MyLibrary.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
