name: Build Windows EXE

# 手动触发：在仓库网页 Actions 里点 "Run workflow" 就会在 GitHub 的 Windows 机器上打包（只产出可下载的构建产物，不会发布）。
# 推 v 开头的 tag 触发：额外自动创建一个 GitHub Release，把打好的 exe 直接挂上去，不用再手动下载、手动建 Release、手动传文件。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 打 tag 触发时要创建 Release、上传文件，需要这个写权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tool + deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build standalone exe
        run: pyinstaller --clean --noconfirm MyLibrary.spec

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLibrary-windows-exe
          path: dist/MyLibrary.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release
        # 只有"推的是 v 开头的 tag"这种触发方式才会走到这一步；手动点 Run workflow 不会创建 Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: gh release create "${{ github.ref_name }}" "dist/MyLibrary.exe" --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

