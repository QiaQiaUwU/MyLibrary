
<script>
// ── 增强: 给 header 加导航链接 ──
(function() {
  const hdr = document.querySelector('.header-inner');
  if (!hdr) return;
  const nav = document.createElement('div');
  nav.style.cssText = 'display:flex;gap:14px;font-size:13px;align-items:center';
  nav.innerHTML = '<a href="/admin" style="color:var(--accent)">管理</a><a href="/settings" style="color:var(--accent)">设置</a>';
  hdr.appendChild(nav);
})();

// ── 增强: 给 openBook 弹窗注入新按钮 ──
const _origOpenBook = typeof openBook === 'function' ? openBook : null;
if (_origOpenBook) {
  window.openBook = async function(id) {
    await _origOpenBook(id);
    // 注入 "在线阅读" 和 "带走" 按钮
    setTimeout(() => {
      const actions = document.querySelector('.modal-actions');
      if (!actions) return;
      // 在线阅读
      if (!document.getElementById('btn-read-online')) {
        const btn = document.createElement('button');
        btn.id = 'btn-read-online';
        btn.className = 'primary';
        btn.textContent = '在线阅读';
        btn.onclick = () => window.open('/reader?id=' + id, '_blank');
        actions.insertBefore(btn, actions.firstChild);
      }
      // 带走标记
      if (!document.getElementById('btn-take')) {
        const bk = DATA.books.find(b => b.id === id);
        const isTake = bk && bk.tt;
        const btn = document.createElement('button');
        btn.id = 'btn-take';
        btn.className = 'toggle' + (isTake ? ' on' : '');
        btn.textContent = isTake ? '已加入带走' : '带走';
        btn.onclick = async () => {
          const newVal = !bk.tt;
          await fetch('/api/pick/toggle', {method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({book_ids: [id], take: newVal})});
          bk.tt = newVal ? 1 : 0;
          btn.textContent = newVal ? '已加入带走' : '带走';
          btn.className = 'toggle' + (newVal ? ' on' : '');
        };
        actions.appendChild(btn);
      }
    }, 100);
  };
}

// ── 增强: 拖放上传区域 ──
(function() {
  const main = document.querySelector('main') || document.body;
  const drop = document.createElement('div');
  drop.id = 'upload-zone';
  drop.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(139,42,42,0.15);z-index:999;display:flex;align-items:center;justify-content:center;pointer-events:none';
  drop.innerHTML = '<div style="background:var(--paper-light,#faf5e8);padding:40px 60px;border-radius:12px;border:3px dashed var(--accent,#8b2a2a);font-size:20px;color:var(--accent,#8b2a2a);pointer-events:none">松开上传入库</div>';
  drop.style.display = 'none';
  document.body.appendChild(drop);

  let dragCount = 0;
  document.addEventListener('dragenter', e => { e.preventDefault(); dragCount++; drop.style.display = 'flex'; });
  document.addEventListener('dragleave', e => { dragCount--; if (dragCount <= 0) { drop.style.display = 'none'; dragCount = 0; }});
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', async e => {
    e.preventDefault(); drop.style.display = 'none'; dragCount = 0;
    const files = e.dataTransfer.files;
    if (!files.length) return;
    let msg = '上传中...';
    for (const f of files) {
      const form = new FormData();
      form.append('file', f);
      try {
        const r = await (await fetch('/api/upload', {method:'POST', body: form})).json();
        msg = f.name + ' 已保存';
      } catch(err) {
        msg = f.name + ' 上传失败';
      }
    }
    alert(msg + '\n\n运行"入库.bat"即可将新书导入图书馆');
  });
})();
</script>
